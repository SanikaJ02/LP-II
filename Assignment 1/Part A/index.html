<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f6fa;
        }

        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            position: fixed;
            width: 220px;
        }

        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }

        .sidebar a:hover {
            background: #334155;
            color: white;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }

        .card-box {
            border-radius: 12px;
            color: white;
            padding: 20px;
        }

        .bg-blue { background: #2563eb; }
        .bg-green { background: #16a34a; }
        .bg-yellow { background: #f59e0b; }
        .bg-red { background: #dc2626; }

        .status-badge {
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
        }

        .completed { background: #16a34a; color: white; }
        .pending { background: #facc15; color: black; }

        @media(max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            .content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4 class="p-3">⚙️ Admin</h4>
    <a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="#"><i class="bi bi-people"></i> Students</a>
    <a href="#"><i class="bi bi-book"></i> Courses</a>
    <a href="#"><i class="bi bi-file-earmark-text"></i> Exams</a>
    <a href="#"><i class="bi bi-bar-chart"></i> Results</a>
    <a href="#"><i class="bi bi-gear"></i> Settings</a>
</div>

<!-- Main Content -->
<div class="content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Dashboard</h2>
        <span>Welcome Admin</span>
    </div>

    <!-- Cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card-box bg-blue">
                <h6>Students</h6>
                <h3>1200</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg-green">
                <h6>Courses</h6>
                <h3>75</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg-yellow">
                <h6>Exams</h6>
                <h3>18</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg-red">
                <h6>Revenue</h6>
                <h3>₹5L</h3>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="card p-3">
        <h5>Recent Activity</h5>
        <table class="table mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>1</td>
                    <td>Sanika</td>
                    <td><span class="status-badge completed">Completed</span></td>
                    <td>25 Mar 2026</td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>Shruti</td>
                    <td><span class="status-badge pending">Pending</span></td>
                    <td>24 Mar 2026</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
